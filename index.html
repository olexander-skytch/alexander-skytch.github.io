<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Trade Journal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=Inter+Tight:wght@500;600&display=swap');
  :root{
    --ink:#161a20;--ink-soft:#39414d;--paper:#f4f1ea;--card:#fcfbf7;
    --line:#ddd6c7;--line-soft:#e9e4d7;--muted:#6f7681;--muted-soft:#9aa0a8;
    --green:#2f6b4a;--green-bg:#e7efe6;--red:#a4392f;--red-bg:#f5e3e0;
    --amber:#b4742e;--amber-bg:#f1e6d2;--blue:#365b8c;--blue-bg:#e4ebf3;
    --serif:'Fraunces',Georgia,serif;--sans:'Inter',system-ui,sans-serif;--tight:'Inter Tight',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:40px;}
  .top{border-bottom:2px solid var(--ink);background:var(--paper);position:sticky;top:0;z-index:30;padding:16px 20px 13px;}
  .top-in{max-width:980px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;}
  .brand{display:flex;align-items:baseline;gap:11px;flex-wrap:wrap;}
  .brand h1{font-family:var(--serif);font-size:27px;font-weight:600;letter-spacing:-0.02em;line-height:1;}
  .brand span{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--muted);}
  .top-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .btn{font-family:var(--tight);font-size:12px;letter-spacing:.04em;text-transform:uppercase;padding:8px 14px;cursor:pointer;border:1px solid var(--ink);background:none;color:var(--ink);transition:all .16s;white-space:nowrap;}
  .btn:hover{background:var(--ink);color:var(--paper);}
  .btn-solid{background:var(--ink);color:var(--paper);}
  .btn-solid:hover{background:var(--ink-soft);}
  .btn-ghost{border-color:var(--line);color:var(--muted);}
  .btn-ghost:hover{background:var(--card);color:var(--ink);border-color:var(--muted);}
  .wrap{max-width:980px;margin:0 auto;padding:0 20px;}
  .tabs{display:flex;margin:22px 0 18px;border-bottom:2px solid var(--ink);}
  .tab{font-family:var(--serif);font-size:17px;font-weight:500;padding:9px 18px 11px;background:none;border:none;cursor:pointer;color:var(--muted);position:relative;}
  .tab.on{color:var(--ink);font-weight:600;}
  .tab.on::after{content:'';position:absolute;left:0;right:0;bottom:-2px;height:3px;background:var(--amber);}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);margin-bottom:22px;}
  .stat{background:var(--card);padding:13px 15px;}
  .stat-label{font-family:var(--tight);font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
  .stat-val{font-family:var(--serif);font-size:22px;font-weight:600;letter-spacing:-0.01em;}
  .stat-sub{font-family:var(--tight);font-size:11px;color:var(--muted-soft);margin-top:2px;}
  .pos{color:var(--green);}.neg{color:var(--red);}
  .bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .seg{display:flex;border:1px solid var(--line);}
  .seg button{font-family:var(--tight);font-size:12px;letter-spacing:.03em;text-transform:uppercase;padding:7px 13px;background:var(--card);border:none;border-right:1px solid var(--line);cursor:pointer;color:var(--muted);}
  .seg button:last-child{border-right:none;}
  .seg button.on{background:var(--ink);color:var(--paper);}
  .search{flex:1;min-width:140px;background:var(--card);border:1px solid var(--line);padding:8px 12px;font-family:var(--sans);font-size:14px;color:var(--ink);outline:none;}
  .search:focus{border-color:var(--amber);}
  .trades{display:flex;flex-direction:column;gap:12px;}
  .trade{background:var(--card);border:1px solid var(--line);position:relative;overflow:hidden;}
  .trade.open-pos{border-left:3px solid var(--blue);}
  .trade.closed-win{border-left:3px solid var(--green);}
  .trade.closed-loss{border-left:3px solid var(--red);}
  .trade-main{padding:14px 16px;cursor:pointer;}
  .trade-row1{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:7px;}
  .ticker-block{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap;}
  .ticker{font-family:var(--serif);font-size:18px;font-weight:600;}
  .name{font-size:13px;color:var(--muted);}
  .ac-chip{font-family:var(--tight);font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;background:var(--amber-bg);color:var(--amber);}
  .status-tag{font-family:var(--tight);font-size:10px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;padding:3px 9px;white-space:nowrap;}
  .tag-open{background:var(--blue-bg);color:var(--blue);}
  .tag-win{background:var(--green-bg);color:var(--green);}
  .tag-loss{background:var(--red-bg);color:var(--red);}
  .trade-row2{display:flex;gap:16px;font-family:var(--tight);font-size:12px;color:var(--muted);flex-wrap:wrap;align-items:center;}
  .trade-row2 b{color:var(--ink-soft);font-weight:600;}
  .pnl-num{font-family:var(--serif);font-size:16px;font-weight:600;white-space:nowrap;}
  .conviction{display:inline-flex;gap:2px;}
  .conv-dot{width:6px;height:6px;border-radius:50%;background:var(--line);}
  .conv-dot.fill{background:var(--amber);}
  .detail{border-top:1px solid var(--line-soft);padding:0 16px;max-height:0;overflow:hidden;transition:max-height .3s ease;}
  .trade.expanded .detail{max-height:1600px;padding:15px 16px;}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px 22px;margin-bottom:14px;}
  .field-label{font-family:var(--tight);font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
  .field-val{font-size:14px;color:var(--ink-soft);line-height:1.45;}
  .field-val.empty{color:var(--muted-soft);font-style:italic;}
  .thesis-block{grid-column:1/-1;background:var(--paper);border:1px solid var(--line-soft);padding:11px 13px;}
  .detail-actions{display:flex;gap:8px;padding-top:13px;border-top:1px solid var(--line-soft);flex-wrap:wrap;}
  .mini-btn{font-family:var(--tight);font-size:11px;letter-spacing:.04em;text-transform:uppercase;padding:6px 12px;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);}
  .mini-btn:hover{border-color:var(--ink);}
  .mini-btn.danger:hover{border-color:var(--red);color:var(--red);}
  .mini-btn.go{background:var(--green);color:#fff;border-color:var(--green);}
  .empty{text-align:center;padding:60px 20px;}
  .empty-mark{font-family:var(--serif);font-size:42px;color:var(--line);margin-bottom:14px;}
  .empty-text{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--muted);line-height:1.6;}
  .panel{display:none;}.panel.on{display:block;}
  .kpi-section{margin-bottom:28px;}
  .kpi-head{font-family:var(--serif);font-size:18px;font-weight:600;margin-bottom:4px;}
  .kpi-sub{font-family:var(--tight);font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
  .kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line);}
  .kpi{background:var(--card);padding:14px 16px;}
  .kpi-label{font-family:var(--tight);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
  .kpi-val{font-family:var(--serif);font-size:23px;font-weight:600;}
  .kpi-note{font-family:var(--tight);font-size:11px;color:var(--muted-soft);margin-top:3px;}
  .breakdown{background:var(--card);border:1px solid var(--line);}
  .bd-row{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:10px;padding:11px 16px;border-bottom:1px solid var(--line-soft);align-items:center;font-size:13px;}
  .bd-row:last-child{border-bottom:none;}
  .bd-row.head{font-family:var(--tight);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);background:var(--paper);}
  .bd-name{font-weight:500;color:var(--ink);}
  .bd-bar-wrap{height:5px;background:var(--line-soft);position:relative;margin-top:4px;}
  .bd-bar{height:100%;position:absolute;left:0;top:0;}
  .modal-bg{position:fixed;inset:0;background:rgba(20,24,31,.4);backdrop-filter:blur(2px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
  .modal-bg.show{display:flex;}
  .modal{background:var(--paper);border:1px solid var(--ink);max-width:580px;width:100%;margin:auto;}
  .modal-head{padding:18px 22px;border-bottom:2px solid var(--ink);display:flex;align-items:center;justify-content:space-between;}
  .modal-title{font-family:var(--serif);font-size:21px;font-weight:600;}
  .modal-close{font-size:24px;line-height:1;background:none;border:none;cursor:pointer;color:var(--muted);padding:0 4px;}
  .modal-body{padding:20px 22px;}
  .form-row{margin-bottom:15px;}
  .form-row.split{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-row.split3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  label{display:block;font-family:var(--tight);font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
  input,select,textarea{width:100%;background:var(--card);border:1px solid var(--line);padding:9px 11px;font-family:var(--sans);font-size:15px;color:var(--ink);outline:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--amber);}
  textarea{resize:vertical;min-height:64px;line-height:1.5;}
  .conv-pick{display:flex;gap:6px;}
  .conv-pick button{flex:1;padding:9px;border:1px solid var(--line);background:var(--card);font-family:var(--tight);font-size:14px;cursor:pointer;color:var(--muted);}
  .conv-pick button.on{background:var(--amber);color:#fff;border-color:var(--amber);}
  .modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;}
  .hint{font-family:var(--tight);font-size:11px;color:var(--muted-soft);margin-top:5px;}
  .reason-pick{display:flex;flex-direction:column;gap:6px;}
  .reason-pick button{text-align:left;padding:9px 12px;border:1px solid var(--line);background:var(--card);font-family:var(--sans);font-size:14px;cursor:pointer;color:var(--ink-soft);}
  .reason-pick button.on{border-color:var(--ink);background:var(--paper);font-weight:500;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--paper);font-family:var(--tight);font-size:13px;letter-spacing:.02em;padding:11px 20px;z-index:200;transition:transform .3s ease;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  @media(max-width:680px){
    .stats{grid-template-columns:1fr 1fr;}
    .kpi-grid{grid-template-columns:1fr 1fr;}
    .detail-grid{grid-template-columns:1fr;}
    .brand h1{font-size:23px;}
    .form-row.split,.form-row.split3{grid-template-columns:1fr;}
    .bd-row{grid-template-columns:1.3fr 1fr 1fr;font-size:12px;}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<header class="top">
  <div class="top-in">
    <div class="brand"><h1>Trade Journal</h1><span>every decision, on the record</span></div>
    <div class="top-actions">
      <button class="btn btn-ghost" onclick="exportData()">Backup</button>
      <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()">Restore</button>
      <button class="btn btn-solid" onclick="openNew()">+ Log Trade</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
</header>
<div class="wrap">
  <div class="tabs">
    <button class="tab on" data-tab="journal" onclick="switchTab('journal')">Journal</button>
    <button class="tab" data-tab="analytics" onclick="switchTab('analytics')">Analytics</button>
  </div>
  <div class="panel on" id="panel-journal">
    <div class="stats" id="stats"></div>
    <div class="bar">
      <div class="seg" id="filterSeg">
        <button class="on" data-f="all">All</button>
        <button data-f="open">Open</button>
        <button data-f="closed">Closed</button>
      </div>
      <input class="search" id="search" placeholder="Search ticker, class or thesis...">
    </div>
    <div class="trades" id="trades"></div>
  </div>
  <div class="panel" id="panel-analytics"><div id="analytics"></div></div>
</div>
<div class="modal-bg" id="entryModal">
  <div class="modal">
    <div class="modal-head"><span class="modal-title" id="entryTitle">Log a Trade</span><button class="modal-close" onclick="closeModal('entryModal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-row split">
        <div><label>Asset class</label><select id="f-class">
          <option>Equity</option><option>ETF</option><option>Investment Trust</option><option>Bond / Gilt</option>
          <option>Commodity</option><option>FX</option><option>Crypto</option><option>Fund</option><option>Other</option>
        </select></div>
        <div><label>Ticker / symbol</label><input id="f-ticker" placeholder="e.g. VWRL" autocapitalize="characters"></div>
      </div>
      <div class="form-row"><label>Asset name (optional)</label><input id="f-name" placeholder="e.g. Vanguard FTSE All-World"></div>
      <div class="form-row split">
        <div><label>Entry date</label><input id="f-date" type="date"></div>
        <div><label>Direction</label><select id="f-dir"><option value="Long">Long</option><option value="Short">Short</option></select></div>
      </div>
      <div class="form-row split3">
        <div><label>Entry price</label><input id="f-price" type="number" step="any" inputmode="decimal" placeholder="0.00"></div>
        <div><label>Quantity</label><input id="f-qty" type="number" step="any" inputmode="decimal" placeholder="0"></div>
        <div><label>Fee</label><input id="f-fee" type="number" step="any" inputmode="decimal" value="7"></div>
      </div>
      <div class="form-row split">
        <div><label>Stop loss (optional)</label><input id="f-stop" type="number" step="any" inputmode="decimal" placeholder="price level"></div>
        <div><label>Target (optional)</label><input id="f-target" type="number" step="any" inputmode="decimal" placeholder="price level"></div>
      </div>
      <div class="form-row">
        <label>Conviction</label>
        <div class="conv-pick" id="f-conv"><button data-c="1">1</button><button data-c="2">2</button><button data-c="3">3</button><button data-c="4">4</button><button data-c="5">5</button></div>
        <div class="hint">1 = speculative · 5 = highest conviction</div>
      </div>
      <div class="form-row"><label>Thesis — why are you entering?</label><textarea id="f-thesis" placeholder="The reasoning, the catalyst you expect, what would prove you right or wrong..."></textarea></div>
      <div class="form-row"><label>Expected catalyst / timeframe</label><input id="f-catalyst" placeholder="e.g. earnings Q3, rate decision, 6-month hold"></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal('entryModal')">Cancel</button><button class="btn btn-solid" onclick="saveTrade()">Save Trade</button></div>
  </div>
</div>
<div class="modal-bg" id="closeModal">
  <div class="modal">
    <div class="modal-head"><span class="modal-title">Close Position</span><button class="modal-close" onclick="closeModal('closeModal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-row split"><div><label>Exit date</label><input id="c-date" type="date"></div><div><label>Exit price</label><input id="c-price" type="number" step="any" inputmode="decimal" placeholder="0.00"></div></div>
      <div class="form-row"><label>Exit fee</label><input id="c-fee" type="number" step="any" inputmode="decimal" value="7"></div>
      <div class="form-row"><label>Why are you closing?</label>
        <div class="reason-pick" id="c-reason">
          <button data-r="Thesis played out">Thesis played out — target reached</button>
          <button data-r="Thesis broken">Thesis broken — reasoning no longer holds</button>
          <button data-r="Stop hit">Stop hit — cutting the loss</button>
          <button data-r="Reallocation">Reallocation — better use of capital</button>
          <button data-r="Risk management">Risk management — trimming exposure</button>
        </div>
      </div>
      <div class="form-row"><label>Outcome vs thesis — did it play out as expected?</label><textarea id="c-lessons" placeholder="Was the decision sound regardless of outcome? What would you repeat or change?"></textarea></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal('closeModal')">Cancel</button><button class="btn btn-solid" onclick="confirmClose()">Confirm Close</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const KEY='tradeJournal_v2';
let trades=load();
let filter='all',search='',convSel=0,closeReason='',editingId=null,closingId=null;
function load(){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):[];}catch(_){return[];}}
function persist(){try{localStorage.setItem(KEY,JSON.stringify(trades));}catch(_){toast('Could not save — storage may be full');}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function num(n){return Number(n).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(d){if(!d)return'';const x=new Date(d);return x.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function daysBetween(a,b){return Math.max(0,Math.round((new Date(b)-new Date(a))/86400000));}
function costOf(t){return t.price*t.qty+(Number(t.fee)||0);}
function pnlOf(t){if(t.status!=='closed')return null;const dir=t.dir==='Short'?-1:1;return (t.exitPrice-t.price)*t.qty*dir-((Number(t.fee)||0)+(Number(t.exitFee)||0));}
function pnlPct(t){const p=pnlOf(t);if(p===null)return null;const c=costOf(t);return c?p/c*100:0;}
function renderStats(){
  const closed=trades.filter(t=>t.status==='closed');
  const open=trades.filter(t=>t.status==='open');
  const realised=closed.reduce((s,t)=>s+(pnlOf(t)||0),0);
  const deployed=open.reduce((s,t)=>s+costOf(t),0);
  const wins=closed.filter(t=>(pnlOf(t)||0)>0).length;
  const winRate=closed.length?Math.round(wins/closed.length*100):0;
  document.getElementById('stats').innerHTML=
    '<div class="stat"><div class="stat-label">Open Positions</div><div class="stat-val">'+open.length+'</div><div class="stat-sub">\u00a3'+num(deployed)+' at cost</div></div>'+
    '<div class="stat"><div class="stat-label">Realised P&L</div><div class="stat-val '+(realised>=0?'pos':'neg')+'">'+(realised>=0?'':'\u2212')+'\u00a3'+num(Math.abs(realised))+'</div><div class="stat-sub">across '+closed.length+' closed</div></div>'+
    '<div class="stat"><div class="stat-label">Win Rate</div><div class="stat-val">'+winRate+'%</div><div class="stat-sub">'+wins+' of '+closed.length+'</div></div>'+
    '<div class="stat"><div class="stat-label">Trades Logged</div><div class="stat-val">'+trades.length+'</div><div class="stat-sub">lifetime</div></div>';
}
function render(){
  renderStats();
  if(document.getElementById('panel-analytics').classList.contains('on'))renderAnalytics();
  let list=trades.slice().sort((a,b)=>new Date(b.date)-new Date(a.date)||(b._c||0)-(a._c||0));
  list=list.filter(t=>{
    if(filter==='open'&&t.status!=='open')return false;
    if(filter==='closed'&&t.status!=='closed')return false;
    const s=search.toLowerCase();
    if(s&&!(t.ticker.toLowerCase().includes(s)||(t.name||'').toLowerCase().includes(s)||(t.thesis||'').toLowerCase().includes(s)||(t.assetClass||'').toLowerCase().includes(s)))return false;
    return true;
  });
  const el=document.getElementById('trades');
  if(!trades.length){el.innerHTML='<div class="empty"><div class="empty-mark">\u00a7</div><div class="empty-text">No trades logged yet.<br>Tap <strong>+ Log Trade</strong> to record your first.</div></div>';return;}
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-text">Nothing matches that filter.</div></div>';return;}
  el.innerHTML=list.map(t=>{
    const p=pnlOf(t),pct=pnlPct(t);
    let cls='open-pos',tag='<span class="status-tag tag-open">Open</span>';
    if(t.status==='closed'){const win=(p||0)>=0;cls=win?'closed-win':'closed-loss';tag='<span class="status-tag '+(win?'tag-win':'tag-loss')+'">'+(win?'Closed \u00b7 Win':'Closed \u00b7 Loss')+'</span>';}
    const convDots=[1,2,3,4,5].map(i=>'<span class="conv-dot '+(i<=(t.conviction||0)?'fill':'')+'"></span>').join('');
    let row2;
    if(t.status==='open'){
      row2='<span><b>'+t.dir+'</b></span><span>Entry <b>\u00a3'+num(t.price)+'</b></span>'+(t.stop?'<span>Stop <b>\u00a3'+num(t.stop)+'</b></span>':'')+'<span class="conviction">'+convDots+'</span>';
    }else{
      row2='<span><b>'+t.dir+'</b></span><span>\u00a3'+num(t.price)+' \u2192 \u00a3'+num(t.exitPrice)+'</span><span class="'+((pct||0)>=0?'pos':'neg')+'">'+((pct||0)>=0?'+':'')+(pct||0).toFixed(1)+'%</span><span>'+daysBetween(t.date,t.exitDate)+'d held</span>';
    }
    let detail='<div class="detail-grid">'+
      '<div><div class="field-label">Entry date</div><div class="field-val">'+fmtDate(t.date)+'</div></div>'+
      '<div><div class="field-label">Position size at cost</div><div class="field-val">\u00a3'+num(t.price*t.qty)+' <span style="color:var(--muted-soft)">+ \u00a3'+num(t.fee||0)+' fee</span></div></div>';
    if(t.stop)detail+='<div><div class="field-label">Stop loss</div><div class="field-val">\u00a3'+num(t.stop)+' <span style="color:var(--muted-soft)">('+(((t.stop-t.price)/t.price)*100).toFixed(1)+'% from entry)</span></div></div>';
    if(t.target)detail+='<div><div class="field-label">Target price</div><div class="field-val">\u00a3'+num(t.target)+' <span style="color:var(--muted-soft)">('+(((t.target-t.price)/t.price)*100).toFixed(1)+'% from entry)</span></div></div>';
    if(t.catalyst)detail+='<div><div class="field-label">Expected catalyst</div><div class="field-val">'+t.catalyst+'</div></div>';
    detail+='<div class="thesis-block"><div class="field-label">Entry thesis</div><div class="field-val '+(t.thesis?'':'empty')+'">'+(t.thesis||'No thesis recorded')+'</div></div>';
    if(t.status==='closed'){
      detail+='<div><div class="field-label">Exit date</div><div class="field-val">'+fmtDate(t.exitDate)+'</div></div>'+
        '<div><div class="field-label">Reason for close</div><div class="field-val">'+(t.reason||'\u2014')+'</div></div>'+
        '<div class="thesis-block"><div class="field-label">Outcome vs thesis</div><div class="field-val '+(t.lessons?'':'empty')+'">'+(t.lessons||'Not recorded')+'</div></div>';
    }
    detail+='</div><div class="detail-actions">';
    if(t.status==='open')detail+='<button class="mini-btn go" onclick="openClose(\''+t.id+'\')">Close Position</button>';
    detail+='<button class="mini-btn" onclick="editTrade(\''+t.id+'\')">Edit</button><button class="mini-btn danger" onclick="delTrade(\''+t.id+'\')">Delete</button></div>';
    return '<div class="trade '+cls+'" id="tr-'+t.id+'">'+
      '<div class="trade-main" onclick="toggle(\''+t.id+'\')">'+
        '<div class="trade-row1"><div class="ticker-block"><span class="ticker">'+t.ticker+'</span>'+(t.name?'<span class="name">'+t.name+'</span>':'')+'<span class="ac-chip">'+(t.assetClass||'\u2014')+'</span></div>'+
        '<div style="display:flex;align-items:center;gap:12px;">'+(t.status==='closed'?'<span class="pnl-num '+((p||0)>=0?'pos':'neg')+'">'+((p||0)>=0?'+':'\u2212')+'\u00a3'+num(Math.abs(p||0))+'</span>':'')+tag+'</div></div>'+
        '<div class="trade-row2">'+row2+'</div>'+
      '</div><div class="detail">'+detail+'</div></div>';
  }).join('');
}
function toggle(id){document.getElementById('tr-'+id).classList.toggle('expanded');}
function renderAnalytics(){
  const closed=trades.filter(t=>t.status==='closed');
  const el=document.getElementById('analytics');
  if(!closed.length){el.innerHTML='<div class="empty"><div class="empty-mark">\u00a7</div><div class="empty-text">Analytics appear once you have closed trades.<br>Close a position to start building your record.</div></div>';return;}
  const wins=closed.filter(t=>pnlOf(t)>0),losses=closed.filter(t=>pnlOf(t)<=0);
  const grossWin=wins.reduce((s,t)=>s+pnlOf(t),0),grossLoss=Math.abs(losses.reduce((s,t)=>s+pnlOf(t),0));
  const net=closed.reduce((s,t)=>s+pnlOf(t),0);
  const winRate=wins.length/closed.length;
  const avgWin=wins.length?grossWin/wins.length:0,avgLoss=losses.length?grossLoss/losses.length:0;
  const profitFactor=grossLoss?grossWin/grossLoss:(grossWin>0?Infinity:0);
  const expectancy=(winRate*avgWin)-((1-winRate)*avgLoss);
  const payoff=avgLoss?avgWin/avgLoss:0;
  const bestT=closed.reduce((a,b)=>pnlOf(b)>pnlOf(a)?b:a);
  const worstT=closed.reduce((a,b)=>pnlOf(b)<pnlOf(a)?b:a);
  const avgHold=Math.round(closed.reduce((s,t)=>s+daysBetween(t.date,t.exitDate),0)/closed.length);
  const totalFees=trades.reduce((s,t)=>s+(Number(t.fee)||0)+(Number(t.exitFee)||0),0);
  function kpi(l,v,n){return '<div class="kpi"><div class="kpi-label">'+l+'</div><div class="kpi-val">'+v+'</div><div class="kpi-note">'+(n||'')+'</div></div>';}
  function breakdown(keyFn,title,sub){
    const g={};
    closed.forEach(t=>{const k=keyFn(t)||'Unspecified';(g[k]=g[k]||[]).push(t);});
    const rows=Object.entries(g).map(([k,arr])=>{const n=arr.reduce((s,t)=>s+pnlOf(t),0);const w=arr.filter(t=>pnlOf(t)>0).length;return{k,count:arr.length,net:n,wr:Math.round(w/arr.length*100)};}).sort((a,b)=>b.net-a.net);
    const maxAbs=Math.max.apply(null,rows.map(r=>Math.abs(r.net)).concat([1]));
    return '<div class="kpi-section"><div class="kpi-head">'+title+'</div><div class="kpi-sub">'+sub+'</div><div class="breakdown">'+
      '<div class="bd-row head"><span>Group</span><span>Trades</span><span>Win rate</span><span>Net P&L</span></div>'+
      rows.map(r=>'<div class="bd-row"><div><div class="bd-name">'+r.k+'</div><div class="bd-bar-wrap"><div class="bd-bar" style="width:'+(Math.abs(r.net)/maxAbs*100)+'%;background:'+(r.net>=0?'var(--green)':'var(--red)')+'"></div></div></div><span>'+r.count+'</span><span>'+r.wr+'%</span><span class="'+(r.net>=0?'pos':'neg')+'" style="font-weight:600">'+(r.net>=0?'+':'\u2212')+'\u00a3'+num(Math.abs(r.net))+'</span></div>').join('')+
      '</div></div>';
  }
  el.innerHTML=
    '<div class="kpi-section"><div class="kpi-head">Performance</div><div class="kpi-sub">Across '+closed.length+' closed trades</div><div class="kpi-grid">'+
      kpi('Net P&L','<span class="'+(net>=0?'pos':'neg')+'">'+(net>=0?'':'\u2212')+'\u00a3'+num(Math.abs(net))+'</span>','realised, after fees')+
      kpi('Win Rate',Math.round(winRate*100)+'%',wins.length+'W / '+losses.length+'L')+
      kpi('Profit Factor',profitFactor===Infinity?'\u221e':profitFactor.toFixed(2),'gross win \u00f7 gross loss')+
      kpi('Expectancy','<span class="'+(expectancy>=0?'pos':'neg')+'">'+(expectancy>=0?'+':'\u2212')+'\u00a3'+num(Math.abs(expectancy))+'</span>','avg \u00a3 per trade')+
      kpi('Payoff Ratio',payoff.toFixed(2),'avg win \u00f7 avg loss')+
      kpi('Avg Hold',avgHold+'d','days per closed trade')+
    '</div></div>'+
    '<div class="kpi-section"><div class="kpi-head">Wins & Losses</div><div class="kpi-sub">The shape of your outcomes</div><div class="kpi-grid">'+
      kpi('Avg Win','<span class="pos">+\u00a3'+num(avgWin)+'</span>',wins.length+' winners')+
      kpi('Avg Loss','<span class="neg">\u2212\u00a3'+num(avgLoss)+'</span>',losses.length+' losers')+
      kpi('Largest Win','<span class="pos">+\u00a3'+num(pnlOf(bestT))+'</span>',bestT.ticker)+
      kpi('Largest Loss','<span class="neg">'+(pnlOf(worstT)<0?'\u2212':'')+'\u00a3'+num(Math.abs(pnlOf(worstT)))+'</span>',worstT.ticker)+
      kpi('Gross Win','<span class="pos">+\u00a3'+num(grossWin)+'</span>','sum of winners')+
      kpi('Total Fees','\u00a3'+num(totalFees),'lifetime dealing cost')+
    '</div></div>'+
    breakdown(t=>t.assetClass,'By Asset Class','Where your edge actually is')+
    breakdown(t=>t.conviction?('Conviction '+t.conviction):'Unrated','By Conviction','Does your conviction predict outcomes?')+
    breakdown(t=>t.reason,'By Exit Reason','How you tend to close');
}
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  document.getElementById('panel-journal').classList.toggle('on',tab==='journal');
  document.getElementById('panel-analytics').classList.toggle('on',tab==='analytics');
  if(tab==='analytics')renderAnalytics();
}
function openNew(){
  editingId=null;convSel=0;
  document.getElementById('entryTitle').textContent='Log a Trade';
  ['f-ticker','f-name','f-price','f-qty','f-stop','f-target','f-thesis','f-catalyst'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-fee').value='7';
  document.getElementById('f-dir').value='Long';
  document.getElementById('f-class').value='Equity';
  document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
  document.querySelectorAll('#f-conv button').forEach(b=>b.classList.remove('on'));
  showModal('entryModal');
}
function editTrade(id){
  const t=trades.find(x=>x.id===id);if(!t)return;
  editingId=id;convSel=t.conviction||0;
  document.getElementById('entryTitle').textContent='Edit Trade';
  document.getElementById('f-class').value=t.assetClass||'Equity';
  document.getElementById('f-ticker').value=t.ticker;
  document.getElementById('f-name').value=t.name||'';
  document.getElementById('f-date').value=t.date;
  document.getElementById('f-dir').value=t.dir;
  document.getElementById('f-price').value=t.price;
  document.getElementById('f-qty').value=t.qty;
  document.getElementById('f-fee').value=t.fee;
  document.getElementById('f-stop').value=t.stop||'';
  document.getElementById('f-target').value=t.target||'';
  document.getElementById('f-thesis').value=t.thesis||'';
  document.getElementById('f-catalyst').value=t.catalyst||'';
  document.querySelectorAll('#f-conv button').forEach(b=>b.classList.toggle('on',+b.dataset.c===convSel));
  showModal('entryModal');
}
document.getElementById('f-conv').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;convSel=+b.dataset.c;document.querySelectorAll('#f-conv button').forEach(x=>x.classList.toggle('on',x===b));});
function saveTrade(){
  const ticker=document.getElementById('f-ticker').value.trim().toUpperCase();
  const price=parseFloat(document.getElementById('f-price').value);
  const qty=parseFloat(document.getElementById('f-qty').value);
  if(!ticker){toast('Enter a ticker');return;}
  if(isNaN(price)||isNaN(qty)){toast('Enter price and quantity');return;}
  const data={
    assetClass:document.getElementById('f-class').value,
    ticker,name:document.getElementById('f-name').value.trim(),
    date:document.getElementById('f-date').value||new Date().toISOString().slice(0,10),
    dir:document.getElementById('f-dir').value,
    price,qty,fee:parseFloat(document.getElementById('f-fee').value)||0,
    stop:parseFloat(document.getElementById('f-stop').value)||null,
    target:parseFloat(document.getElementById('f-target').value)||null,
    conviction:convSel,
    thesis:document.getElementById('f-thesis').value.trim(),
    catalyst:document.getElementById('f-catalyst').value.trim()
  };
  if(editingId){Object.assign(trades.find(x=>x.id===editingId),data);toast('Trade updated');}
  else{trades.push(Object.assign({id:uid(),status:'open',_c:Date.now()},data));toast('Trade logged');}
  persist();render();closeModal('entryModal');
}
function openClose(id){
  closingId=id;closeReason='';
  document.getElementById('c-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('c-price').value='';document.getElementById('c-fee').value='7';document.getElementById('c-lessons').value='';
  document.querySelectorAll('#c-reason button').forEach(b=>b.classList.remove('on'));
  showModal('closeModal');
}
document.getElementById('c-reason').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;closeReason=b.dataset.r;document.querySelectorAll('#c-reason button').forEach(x=>x.classList.toggle('on',x===b));});
function confirmClose(){
  const t=trades.find(x=>x.id===closingId);if(!t)return;
  const ep=parseFloat(document.getElementById('c-price').value);
  if(isNaN(ep)){toast('Enter the exit price');return;}
  if(!closeReason){toast('Pick a reason for closing');return;}
  t.status='closed';
  t.exitDate=document.getElementById('c-date').value||new Date().toISOString().slice(0,10);
  t.exitPrice=ep;t.exitFee=parseFloat(document.getElementById('c-fee').value)||0;
  t.reason=closeReason;t.lessons=document.getElementById('c-lessons').value.trim();
  persist();render();closeModal('closeModal');toast('Position closed');
}
function delTrade(id){if(!confirm('Delete this trade permanently? This cannot be undone.'))return;trades=trades.filter(t=>t.id!==id);persist();render();toast('Trade deleted');}
function exportData(){
  const blob=new Blob([JSON.stringify(trades,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download='trade-journal-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(url);
  toast('Backup downloaded');
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=function(){try{const data=JSON.parse(r.result);if(!Array.isArray(data))throw 0;if(!confirm('Restore '+data.length+' trades? This replaces your current journal.'))return;trades=data;persist();render();toast('Journal restored');}catch(_){toast('Could not read that file');}};
  r.readAsText(file);e.target.value='';
}
function showModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}
let toastT;function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2200);}
document.getElementById('filterSeg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;document.querySelectorAll('#filterSeg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');filter=b.dataset.f;render();});
document.getElementById('search').addEventListener('input',e=>{search=e.target.value;render();});
document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)closeModal(m.id);}));
render();
</script>
</body>
</html>
